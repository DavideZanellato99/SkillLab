version: 2
updates:
  # Python backend deps: Dependabot bumps requirements.txt; regenerate the
  # hashed lock from requirements.in when a PR touches a version you keep.
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]

  # Frontend npm deps.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns: ["*"]

  # Base images in the two Dockerfiles.
  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
    schedule:
      interval: weekly

  # The GitHub Actions themselves (setup-python, trivy-action, ...).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
