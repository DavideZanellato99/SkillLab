name: CI

# Runs on direct pushes to the two long-lived branches (stage is the active
# integration branch, main the stable one) and on any PR targeting them.
on:
  push:
    branches: [stage, main]
  pull_request:
    branches: [stage, main]

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend lint & types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format)
        run: ruff format --check .
      - name: Mypy (types)
        run: mypy

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skilllab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # conftest fills every other required var with a placeholder; only the
      # database has to point at the service container above.
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/skilllab_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Pytest (with coverage gate)
        run: pytest --cov

  frontend:
    name: Frontend lint, build & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Build (tsc + vite)
        run: npm run build
      - name: Tests (vitest)
        run: npm run test

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit being pushed, not
          # just the tip. gitleaks-action exits non-zero on any finding,
          # which fails this job and (via ci-success) blocks the merge.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-smoke:
    name: Docker build & compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create backend .env from the template
        # Placeholder values are enough to boot; the smoke test only hits the
        # unauthenticated health endpoint, never the external APIs.
        run: cp backend/.env.example backend/.env
      - name: Build images and start the stack (production compose)
        # docker-compose.yml alone (without the dev override) is the real
        # production build: backend on uvicorn, frontend static behind nginx.
        run: docker compose -f docker-compose.yml up -d --build
      - name: Wait for the backend health endpoint
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/ >/dev/null; then
              echo "backend is up"; exit 0
            fi
            sleep 2
          done
          echo "backend did not become healthy in time"; exit 1
      - name: Check the frontend is served
        run: curl -fsS http://localhost:3000/ >/dev/null
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # Single check to require in branch settings: green only if every job above
  # succeeded.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-tests, frontend, secrets, docker-smoke]
    if: always()
    steps:
      - name: Fail if any job failed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs failed."; exit 1
          fi
          echo "All CI jobs passed."
