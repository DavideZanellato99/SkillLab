<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="#1e1b4b"/>
  <rect width="400" height="400" rx="32" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="320" cy="80" r="100" fill="#6366f1" opacity="0.15" filter="url(#blur)"/>
  <circle cx="80" cy="320" r="80" fill="#a78bfa" opacity="0.15" filter="url(#blur)"/>
  <circle cx="200" cy="200" r="150" fill="url(#glow)"/>
  
  <!-- Decorative ring -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Small decorative dots -->
  <circle cx="100" cy="100" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="300" cy="120" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="320" cy="280" r="4" fill="#6366f1" opacity="0.4"/>
  <circle cx="80" cy="250" r="2.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="150" cy="60" r="2" fill="#6366f1" opacity="0.6"/>
  <circle cx="260" cy="340" r="3" fill="#a78bfa" opacity="0.4"/>
  
  <!-- Emoji Avatar -->
  <text x="200" y="215" text-anchor="middle" dominant-baseline="central" 
        font-size="120" filter="url(#shadow)">🌌</text>
  
  <!-- Bottom gradient overlay -->
  <defs>
    <linearGradient id="bottomFade" x1="0" y1="0.7" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="32" fill="url(#bottomFade)"/>
</svg>