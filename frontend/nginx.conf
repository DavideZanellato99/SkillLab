# Only set "Connection: upgrade" for actual WebSocket requests (the voice
# call socket at /api/voice/ws); keep-alive would otherwise be broken for
# every regular /api/ request proxied below.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to the FastAPI backend, mirroring the Vite dev
    # server proxy in vite.config.ts so the browser only ever talks to
    # this one origin (no CORS involved).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # React Router: let the app handle client-side routes
    location / {
        try_files $uri /index.html;
    }
}
